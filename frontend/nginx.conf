map $http_user_agent $is_crawler {
    default 0;
    "~*facebookexternalhit|Twitterbot|Slackbot|LINE|Discordbot|WhatsApp|TelegramBot|Pinterest|redditbot|Googlebot|bingbot|Applebot|SkypeUriPreview" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Crawlers hitting a thread URL get server-rendered OG meta from the backend;
    # humans fall through to the SPA via try_files.
    location ~ ^/thread/([^/#?]+)$ {
        if ($is_crawler) {
            proxy_pass http://backend:3636/share/thread/$1;
        }
        try_files $uri /index.html;
    }

    # SPA: route everything that isn't a real file back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
