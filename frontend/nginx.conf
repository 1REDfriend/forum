map $http_user_agent $is_crawler {
    default 0;
    "~*facebookexternalhit|Twitterbot|Slackbot|LINE|Discordbot|WhatsApp|TelegramBot|Pinterest|redditbot|Googlebot|bingbot|Applebot|SkypeUriPreview" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — required because the proxy_pass below uses a
    # variable ($backend), which forces nginx to resolve the name at request time.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Crawlers hitting a thread URL get server-rendered OG meta from the backend;
    # humans fall through to the SPA via try_files.
    location ~ ^/thread/([^/#?]+)$ {
        # proxy_pass with a variable host ignores any URI written here, so the
        # target path is set via rewrite (…break) instead.
        set $backend backend:3636;
        if ($is_crawler) {
            rewrite ^/thread/(.*)$ /share/thread/$1 break;
            proxy_pass http://$backend;
        }
        try_files $uri /index.html;
    }

    # A single-segment forum URL (exclude the /forum/create form route).
    location ~ ^/forum/(?!create$)([^/#?]+)$ {
        set $backend backend:3636;
        if ($is_crawler) {
            rewrite ^/forum/(.*)$ /share/forum/$1 break;
            proxy_pass http://$backend;
        }
        try_files $uri /index.html;
    }

    # User profile URL.
    location ~ ^/user/([^/#?]+)$ {
        set $backend backend:3636;
        if ($is_crawler) {
            rewrite ^/user/(.*)$ /share/user/$1 break;
            proxy_pass http://$backend;
        }
        try_files $uri /index.html;
    }

    # SPA: route everything that isn't a real file back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
