services:
  db:
    image: postgres:16-alpine
    container_name: forum-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bind to loopback so the DB is reachable for local tooling but not the public internet.
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$VAR escapes compose interpolation so the container shell expands its own env.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: forum-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      STORAGE_DRIVER: ${STORAGE_DRIVER}
      CDN_BASE_URL: ${CDN_BASE_URL}
      CDN_API_KEY: ${CDN_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      # Lets the backend reach the Axite CDN container (axite-elysia) when STORAGE_DRIVER=cdn.
      - axite

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time, baked into the static bundle (browser-facing).
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: forum-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

networks:
  # forum's own private network (db <-> backend <-> frontend)
  default:
  # Lets the backend reach the Axite CDN stack (axite-elysia) when STORAGE_DRIVER=cdn.
  # External: the Axite stack owns/creates this network. If you run forum without Axite
  # on this host, set STORAGE_DRIVER=local and remove the `- axite` ref under backend.
  axite:
    external: true
    name: axite-cdn-internal

volumes:
  pgdata:
  uploads:
